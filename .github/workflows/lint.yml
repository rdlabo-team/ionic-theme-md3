name: Lint
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Angular
        uses: actions/cache@v5
        with:
          path: demo/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('demo/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-angular-${{ hashFiles('demo/package-lock.json') }}-
            ${{ runner.os }}-angular-
      # The demo depends on this package via `file:..`, so the root package
      # must be installed and built (dist/) before the demo can compile.
      - run: npm ci
      - run: npm run build
      - run: npm ci
        working-directory: './demo'
      - run: npm run lint
        working-directory: './demo'
      - run: npm test -- --watch=false
        working-directory: './demo'
